{% extends "base.html" %}

{% block content %}

<h2>{% if course %}Edit Course{% else %}Add Course{% endif %}</h2>

<div class="card">

<form method="post">

<div class="form-group">
<label>Course Name</label>
<input type="text" name="course_name" required value="{{ course.course_name if course else '' }}">
</div>

<div class="form-group">
<label>Duration</label>
<input type="text" name="duration" value="{{ course.duration if course else '' }}">
</div>

<div class="form-group">
<label>Course Fee</label>
<input type="number" name="fee" required value="{{ course.fee if course else '' }}">
</div>

<button class="btn btn-primary">
Save Course
</button>

</form>

</div>

{% endblock %}
